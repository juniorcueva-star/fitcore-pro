spring.application.name=fitcore-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/fitcore_pro
spring.datasource.username=fitcore_user
spring.datasource.password=fitcore_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
app.jwt.secret=fitcorepro-super-secret-key-fitcorepro-super-secret-key-2026
app.jwt.expiration-ms=86400000

spring.web.error.include-stacktrace=never
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always